services:\
  - type: web\
    name: murmur\
    env: node\
    plan: free          # ou "starter" pour le disque persistant\
    buildCommand: npm install\
    startCommand: node server.js\
    envVars:\
      - key: JWT_SECRET\
        generateValue: true     # Render g\'e9n\'e8re automatiquement une valeur s\'e9curis\'e9e\
      - key: PORT\
        value: 10000            # Render utilise le port 10000\
      - key: DB_FILE\
        value: /opt/render/project/src/murmur.db\
    disk:\
      name: murmur-data\
      mountPath: /opt/render/project/src\
      sizeGB: 1               # N\'e9cessite le plan Starter (7$/mois)}